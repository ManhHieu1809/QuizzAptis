        function parseListening(text) {
            const lines = text.trim().split('\n');
            const questions = [];
            let currentQ = null;

            for (let line of lines) {
                line = line.trim();
                if (!line) continue;

                if (line.startsWith('Câu ')) {
                    if (currentQ && currentQ.options.length > 0) questions.push(currentQ);
                    const colonIdx = line.indexOf(':');
                    currentQ = {
                        id: line.substring(4, colonIdx).trim(),
                        text: line.substring(colonIdx + 1).trim(),
                        type: 'mcq',
                        options: [],
                        correctAnswer: null,
                    };
                } else if (line.match(/^[A-Z]\./)) {
                    if (!currentQ) continue;
                    let optText = line.substring(2).trim();
                    const isCorrect = optText.includes('( ✓ Đáp án đúng)') || optText.includes('✓');
                    if (isCorrect) {
                        optText = optText.replace(/\(?\s*✓\s*Đáp án đúng\s*\)?/gi, '').trim();
                        currentQ.correctAnswer = currentQ.options.length;
                    }
                    currentQ.options.push(optText);
                } else if (line.startsWith('Đáp án:')) {
                    if (!currentQ) continue;
                    let ansText = line.substring(7).trim();
                    currentQ.options.push(ansText);
                    currentQ.correctAnswer = 0;
                }
            }
            if (currentQ && currentQ.options.length > 0) questions.push(currentQ);

            // Sinh đáp án nhiễu (Fake options) cho các câu chỉ có 1 đáp án
            const allOptionsPool = Array.from(new Set(questions.flatMap(q => q.options)));
            questions.forEach(q => {
                if (q.options.length === 1) {
                    const correctText = q.options[0];
                    const correctWordCount = correctText.split(' ').length;
                    let validFakes = allOptionsPool.filter(opt => {
                        if (opt.toLowerCase() === correctText.toLowerCase()) return false;
                        return Math.abs(opt.split(' ').length - correctWordCount) <= 2;
                    });
                    if (validFakes.length < 2) {
                        validFakes = allOptionsPool.filter(opt => opt.toLowerCase() !== correctText.toLowerCase());
                    }
                    validFakes = validFakes.sort(() => 0.5 - Math.random());
                    let newOptions = [correctText, validFakes[0] || "None", validFakes[1] || "All"];
                    newOptions = newOptions.sort(() => 0.5 - Math.random());
                    q.options = newOptions;
                    q.correctAnswer = newOptions.indexOf(correctText);
                }
            });

            return questions;
        }

        // ==========================================
        // 3. CÁC HÀM XỬ LÝ LOGIC
        // ==========================================
        function shuffleArray(array) {
            let newArr = [...array];
            let isSame = true;
            while(isSame && newArr.length > 1) {
                newArr.sort(() => 0.5 - Math.random());
                isSame = newArr.every((item, i) => item.originalIndex === i);
            }
            return newArr;
        }

        function shuffleSimple(array) {
            const newArr = [...array];
            for (let i = newArr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [newArr[i], newArr[j]] = [newArr[j], newArr[i]];
            }
            return newArr;
        }

        function setupQuestion(index) {
            let updates = {
                isAnswered: false,
                selectedOptionIndex: null,
                currentIndex: index,
                dropdownAnswers: {},
                reading3Current: null,
                reading4Answers: {},
                reading4Current: null,
                listening2Answers: {},
                listening2Current: null
            };

            if (state.activeModule.type === 'reorder' && state.questions[index]) {
                const items = state.questions[index].sentences.map((text, idx) => ({ id: `id-${idx}`, originalIndex: idx, text }));
                updates.availableItems = shuffleArray(items);
                updates.slottedItems = new Array(items.length).fill(null);
            }

            if (state.activeModule.type === 'reading3' && state.questions[index]) {
                const q = state.questions[index];
                updates.reading3Current = {
                    ...q,
                    paragraphs: shuffleSimple(q.paragraphs),
                    questions: shuffleSimple(q.questions)
                };
            }

            if (state.activeModule.type === 'reading4' && state.questions[index]) {
                const q = state.questions[index];
                updates.reading4Current = {
                    ...q,
                    paragraphs: shuffleSimple(q.paragraphs)
                };
            }

            if (state.activeModule.type === 'listening2' && state.questions[index]) {
                const q = state.questions[index];
                updates.listening2Current = {
                    ...q,
                    speakers: shuffleSimple(q.speakers)
                };
            }

            setState(updates);
        }

        // Đưa các hàm ra global (window) để gọi từ HTML nội tuyến
        window.changeModule = function(moduleId) {
            const mod = modules.find(m => m.id === moduleId);
            const questions = mod.type === 'mcq' ? parseListening(mod.data) : mod.data;
            if (window.speechSynthesis) window.speechSynthesis.cancel();
            setState({ activeModule: mod, questions: questions, appState: 'menu', isSidebarOpen: false, reading3Current: null, dropdownAnswers: {}, reading4Current: null, reading4Answers: {}, listening2Current: null, listening2Answers: {} });
        };

        window.toggleSidebar = function(forceClose = false) {
            setState({ isSidebarOpen: forceClose ? false : !state.isSidebarOpen });
        };

        window.startQuiz = function() {
            setState({ appState: 'quiz', score: 0 });
            setupQuestion(0);
        };

        window.selectOption = function(idx) {
            if (state.isAnswered) return;
            setState({ selectedOptionIndex: idx });
        };

        window.selectDropdownOption = function(qIndex, value) {
            if (state.isAnswered) return;
            const mainContainer = document.getElementById('app-main');
            const previousScrollTop = mainContainer ? mainContainer.scrollTop : 0;
            const newAnswers = { ...state.dropdownAnswers, [qIndex]: value };
            setState({ dropdownAnswers: newAnswers });

            // Keep reading position stable after rerender.
            requestAnimationFrame(() => {
                const nextMainContainer = document.getElementById('app-main');
                if (nextMainContainer) {
                    nextMainContainer.scrollTop = previousScrollTop;
                }
            });
        };

        window.selectReading4Option = function(pIndex, value) {
            if (state.isAnswered) return;
            const mainContainer = document.getElementById('app-main');
            const previousScrollTop = mainContainer ? mainContainer.scrollTop : 0;
            const newAnswers = { ...state.reading4Answers, [pIndex]: value };
            setState({ reading4Answers: newAnswers });

            requestAnimationFrame(() => {
                const nextMainContainer = document.getElementById('app-main');
                if (nextMainContainer) nextMainContainer.scrollTop = previousScrollTop;
            });
        };

        window.selectListening2Option = function(speakerIndex, value) {
            if (state.isAnswered) return;
            const mainContainer = document.getElementById('app-main');
            const previousScrollTop = mainContainer ? mainContainer.scrollTop : 0;
            const newAnswers = { ...state.listening2Answers, [speakerIndex]: value };
            setState({ listening2Answers: newAnswers });

            requestAnimationFrame(() => {
                const nextMainContainer = document.getElementById('app-main');
                if (nextMainContainer) nextMainContainer.scrollTop = previousScrollTop;
            });
        };

        window.getListening2OptionLabel = function(question, key) {
            if (!question || !question.options) return key || '';
            const matched = question.options.find(opt => opt.key === key);
            if (!matched) return key || '';
            return `${matched.key}. ${matched.text}`;
        };

        window.getEnglishVoice = function() {
            if (!('speechSynthesis' in window)) return null;
            const voices = window.speechSynthesis.getVoices() || [];
            if (!voices.length) return null;
            return voices.find(v => /^en[-_]/i.test(v.lang) && /female|zira|aria|jenny/i.test(v.name))
                || voices.find(v => /^en[-_]/i.test(v.lang) && /us|uk/i.test(v.lang))
                || voices.find(v => /^en[-_]/i.test(v.lang))
                || voices[0];
        };

        window.speakText = function(text, onEnd = null) {
            if (!('speechSynthesis' in window)) {
                alert('Trình duyệt không hỗ trợ tính năng phát âm.');
                return;
            }
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'en-US';
            utterance.rate = 0.95;
            const pickedVoice = window.getEnglishVoice();
            if (pickedVoice) utterance.voice = pickedVoice;
            if (typeof onEnd === 'function') utterance.onend = onEnd;
            window.speechSynthesis.speak(utterance);
        };

        window.stopSpeaking = function() {
            if ('speechSynthesis' in window) window.speechSynthesis.cancel();
        };

        window.playAllListening2 = function() {
            const currentQ = state.listening2Current || state.questions[state.currentIndex];
            if (!currentQ || !currentQ.speakers) return;
            if (!('speechSynthesis' in window)) return;
            window.speechSynthesis.cancel();

            const queue = currentQ.speakers.map((s, idx) => `Speaker ${idx + 1}. ${s.text}`);
            const speakNext = (i) => {
                if (i >= queue.length) return;
                window.speakText(queue[i], () => setTimeout(() => speakNext(i + 1), 150));
            };
            speakNext(0);
        };

        window.playListening2Speaker = function(speakerIndex) {
            const currentQ = state.listening2Current || state.questions[state.currentIndex];
            if (!currentQ || !currentQ.speakers || !currentQ.speakers[speakerIndex]) return;
            if (!('speechSynthesis' in window)) return;
            window.speechSynthesis.cancel();
            const text = currentQ.speakers[speakerIndex].text;
            window.speakText(text);
        };

        if ('speechSynthesis' in window) {
            window.speechSynthesis.onvoiceschanged = () => {
                window.speechSynthesis.getVoices();
            };
        }

        window.checkAnswer = function() {
            if (state.isAnswered) return;
            let isCorrect = false;

            if (state.activeModule.type === 'mcq') {
                if (state.selectedOptionIndex === null) return;
                isCorrect = state.selectedOptionIndex === state.questions[state.currentIndex].correctAnswer;
            } else if (state.activeModule.type === 'reorder') {
                isCorrect = state.slottedItems.every((item, idx) => item && item.originalIndex === idx);
            } else if (state.activeModule.type === 'reading3') {
                const currentQ = state.reading3Current || state.questions[state.currentIndex];
                const totalCorrect = currentQ.questions.reduce((count, q, idx) => {
                    return count + (state.dropdownAnswers[idx] === q.answer ? 1 : 0);
                }, 0);
                isCorrect = totalCorrect === currentQ.questions.length;
            } else if (state.activeModule.type === 'reading4') {
                const currentQ = state.reading4Current || state.questions[state.currentIndex];
                const totalCorrect = currentQ.paragraphs.reduce((count, p, idx) => {
                    return count + (state.reading4Answers[idx] === p.answer ? 1 : 0);
                }, 0);
                isCorrect = totalCorrect === currentQ.paragraphs.length;
            } else if (state.activeModule.type === 'listening2') {
                const currentQ = state.listening2Current || state.questions[state.currentIndex];
                const totalCorrect = currentQ.speakers.reduce((count, s, idx) => {
                    return count + (state.listening2Answers[idx] === s.answer ? 1 : 0);
                }, 0);
                isCorrect = totalCorrect === currentQ.speakers.length;
            }

            setState({ 
                isAnswered: true,
                score: isCorrect ? state.score + 1 : state.score
            });
        };

        window.nextQuestion = function() {
            if (window.speechSynthesis) window.speechSynthesis.cancel();
            if (state.currentIndex < state.questions.length - 1) {
                setupQuestion(state.currentIndex + 1);
            } else {
                setState({ appState: 'result' });
            }
        };

        // Kéo Thả (Drag and Drop)
        window.handleDragStart = function(e, type, index) {
            if (state.isAnswered) {
                e.preventDefault();
                return;
            }
            let item = type === 'pool' ? state.availableItems[index] : state.slottedItems[index];
            state.dragSource = { type, index, item };
            e.dataTransfer.effectAllowed = 'move';
            e.dataTransfer.setData('text/plain', item.id);
        };

        window.handleDragOver = function(e) {
            e.preventDefault();
            e.currentTarget.classList.add('drag-over');
        };

        window.handleDragLeave = function(e) {
            e.currentTarget.classList.remove('drag-over');
        }

        window.handleDropOnSlot = function(e, slotIndex) {
            e.preventDefault();
            e.currentTarget.classList.remove('drag-over');
            if (state.isAnswered || !state.dragSource) return;

            const newSlotted = [...state.slottedItems];
            const newAvailable = [...state.availableItems];
            const targetItem = newSlotted[slotIndex];

            if (state.dragSource.type === 'pool') {
                newAvailable.splice(state.dragSource.index, 1);
                newSlotted[slotIndex] = state.dragSource.item;
                if (targetItem) newAvailable.push(targetItem);
            } else if (state.dragSource.type === 'slot') {
                if (state.dragSource.index === slotIndex) return;
                newSlotted[state.dragSource.index] = targetItem;
                newSlotted[slotIndex] = state.dragSource.item;
            }

            setState({ slottedItems: newSlotted, availableItems: newAvailable, dragSource: null });
        };

        window.handleDropOnPool = function(e) {
            e.preventDefault();
            e.currentTarget.classList.remove('drag-over');
            if (state.isAnswered || !state.dragSource) return;

            if (state.dragSource.type === 'slot') {
                const newSlotted = [...state.slottedItems];
                const newAvailable = [...state.availableItems];
                newSlotted[state.dragSource.index] = null;
                newAvailable.push(state.dragSource.item);
                setState({ slottedItems: newSlotted, availableItems: newAvailable, dragSource: null });
            } else {
                state.dragSource = null;
            }
        };

        // Nhấp (Tap) để đổi ô (Cho Mobile)
        window.handleClickPoolItem = function(index) {
            if (state.isAnswered) return;
            const firstEmptySlot = state.slottedItems.findIndex(item => item === null);
            if (firstEmptySlot !== -1) {
                const newSlotted = [...state.slottedItems];
                const newAvailable = [...state.availableItems];
                const item = newAvailable.splice(index, 1)[0];
                newSlotted[firstEmptySlot] = item;
                setState({ slottedItems: newSlotted, availableItems: newAvailable });
            }
        };

        window.handleClickSlotItem = function(index) {
            if (state.isAnswered || !state.slottedItems[index]) return;
            const newSlotted = [...state.slottedItems];
            const newAvailable = [...state.availableItems];
            const item = newSlotted[index];
            newSlotted[index] = null;
            newAvailable.push(item);
            setState({ slottedItems: newSlotted, availableItems: newAvailable });
        };

                            ${leftPanelHTML}
                            <!-- Mũi tên giữa -->
                            <div class="hidden lg:flex items-center justify-center text-gray-300">
                                <i class="fa-solid fa-arrow-right text-3xl"></i>
                            </div>
                            <!-- Cột Phải -->
                            <div class="flex-1 min-h-[280px] lg:min-h-0 flex flex-col">
                                <div class="mb-4">
                                    <h3 class="font-bold text-blue-800 text-lg">Đoạn văn hoàn chỉnh</h3>
                                    <p class="text-sm text-blue-600/70 mt-1">Thả các câu vào vị trí tương ứng</p>
                                </div>
                                <div class="space-y-3 bg-blue-50/30 p-4 md:p-5 rounded-2xl border border-blue-100 flex-1 overflow-y-auto pr-1">
                                    ${fixHTML}
                                    ${slotItemsHTML}
                                </div>
                            </div>
                        </div>
                    `;
                } else if (state.activeModule.type === 'reading3') {
                    const paragraphsHTML = currentQ.paragraphs.map(p => `
                        <div class="mb-5 bg-white border border-gray-200 rounded-xl p-4 md:p-5">
                            <h3 class="font-bold text-gray-800 mb-2 text-lg">Person ${p.person}</h3>
                            <p class="text-gray-700 text-justify leading-relaxed text-base">${p.text}</p>
                        </div>
                    `).join('');

                    const questionsHTML = currentQ.questions.map((q, idx) => {
                        let selectStyle = "border-gray-300 text-gray-700 bg-white hover:border-blue-400 focus:ring-2 focus:ring-blue-100";
                        let feedbackIcon = "";
                        const userAnswer = state.dropdownAnswers[idx] || "";

                        if (state.isAnswered) {
                            if (userAnswer === q.answer) {
                                selectStyle = "border-green-500 bg-green-50 text-green-700 font-bold";
                                feedbackIcon = `<i class="fa-solid fa-check text-green-500 ml-2"></i>`;
                            } else {
                                selectStyle = "border-red-500 bg-red-50 text-red-700";
                                feedbackIcon = `<i class="fa-solid fa-xmark text-red-500 ml-2"></i> <span class="text-green-600 font-bold ml-2 text-sm">(Đúng: ${q.answer})</span>`;
                            }
                        }

                        return `
                            <div class="flex flex-col sm:flex-row sm:items-center justify-between py-3 border-b border-gray-100 last:border-0 gap-3">
                                <div class="flex-1">
                                    <span class="font-bold mr-2 text-gray-700">${idx + 1}.</span>
                                    <span class="text-gray-700">${q.text}</span>
                                </div>
                                <div class="flex items-center shrink-0">
                                    <select
                                        ${state.isAnswered ? 'disabled' : ''}
                                        onchange="window.selectDropdownOption(${idx}, this.value)"
                                        class="px-4 py-2 border-2 rounded-lg outline-none cursor-pointer transition-all ${selectStyle}"
                                    >
                                        <option value="" disabled ${!userAnswer ? 'selected' : ''}>Chọn...</option>
                                        ${currentQ.paragraphs.map(p => `<option value="${p.person}" ${userAnswer === p.person ? 'selected' : ''}>Person ${p.person}</option>`).join('')}
                                    </select>
                                    ${feedbackIcon}
                                </div>
                            </div>
                        `;
                    }).join('');

                    contentHTML = `
                        <div class="space-y-6">
                            <div class="bg-gray-50 border border-gray-200 rounded-2xl p-4 md:p-6">
                                <h3 class="font-bold text-gray-800 text-xl mb-4">Đoạn văn</h3>
                                ${paragraphsHTML}
                            </div>
                            <div class="bg-white border-2 border-blue-100 rounded-2xl p-4 md:p-6">
                                <h3 class="font-bold text-blue-800 text-xl mb-4">Choose the correct person (A, B, C or D)</h3>
                                <div class="space-y-1">
                                    ${questionsHTML}
                                </div>
                            </div>
                        </div>
                    `;
                } else if (state.activeModule.type === 'reading4') {
                    const paragraphItemsHTML = currentQ.paragraphs.map((p, idx) => {
                        const userAnswer = state.reading4Answers[idx] || "";
                        let selectStyle = "border-gray-300 text-gray-700 bg-white hover:border-blue-400 focus:ring-2 focus:ring-blue-100";
                        let feedbackHTML = "";

                        if (state.isAnswered) {
                            if (userAnswer === p.answer) {
                                selectStyle = "border-green-500 bg-green-50 text-green-700 font-bold";
                                feedbackHTML = `<span class="text-green-600 text-sm font-semibold">Đúng</span>`;
                            } else {
                                selectStyle = "border-red-500 bg-red-50 text-red-700";
                                feedbackHTML = `<span class="text-red-500 text-sm font-semibold">Sai</span><span class="text-green-600 text-sm font-semibold">Đáp án: ${p.answer}</span>`;
                            }
                        }

                        return `
                            <div class="bg-white border border-gray-200 rounded-2xl p-4 md:p-5 space-y-3">
                                <div class="flex flex-wrap items-center gap-3">
                                    <span class="text-sm font-semibold text-gray-500">Paragraph ${idx + 1}</span>
                                    <select
                                        ${state.isAnswered ? 'disabled' : ''}
                                        onchange="window.selectReading4Option(${idx}, this.value)"
                                        class="px-4 py-2 border-2 rounded-lg outline-none cursor-pointer transition-all ${selectStyle}"
                                    >
                                        <option value="" disabled ${!userAnswer ? 'selected' : ''}>Chọn heading...</option>
                                        ${currentQ.options.map(opt => `<option value="${opt}" ${userAnswer === opt ? 'selected' : ''}>${opt}</option>`).join('')}
                                    </select>
                                    <div class="flex items-center gap-2">${feedbackHTML}</div>
                                </div>
                                <p class="text-gray-700 leading-relaxed text-base">${p.text}</p>
                            </div>
                        `;
                    }).join('');

                    contentHTML = `
                        <div class="space-y-6">
                            <div class="space-y-4">
                                ${paragraphItemsHTML}
                            </div>
                        </div>
                    `;
                } else if (state.activeModule.type === 'listening2') {
                    const speakerCardsHTML = currentQ.speakers.map((s, idx) => {
                        const userAnswer = state.listening2Answers[idx] || '';
                        let selectStyle = 'border-gray-300 text-gray-700 bg-white';
                        let resultHTML = '';
                        if (state.isAnswered) {
                            if (userAnswer === s.answer) {
                                selectStyle = 'border-green-500 bg-green-50 text-green-700 font-bold';
                                resultHTML = '<span class="text-green-600 font-semibold">Đúng</span>';
                            } else {
                                selectStyle = 'border-red-500 bg-red-50 text-red-700';
                                resultHTML = `<span class="text-red-600 font-semibold">Sai</span><span class="text-green-700 text-sm">Đáp án: ${window.getListening2OptionLabel(currentQ, s.answer)}</span>`;
                            }
                        }

                        return `
                            <div class="bg-white border border-gray-200 rounded-2xl p-4 space-y-3">
                                <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-3">
                                    <h4 class="font-bold text-gray-800 text-lg">Speaker ${idx + 1}</h4>
                                    <button onclick="window.playListening2Speaker(${idx})" class="px-4 py-2 bg-indigo-600 hover:bg-indigo-700 text-white rounded-lg font-semibold">
                                        <i class="fa-solid fa-volume-high mr-2"></i>Nghe đoạn này
                                    </button>
                                </div>
                                <div class="flex flex-wrap items-center gap-3">
                                    <select
                                        ${state.isAnswered ? 'disabled' : ''}
                                        onchange="window.selectListening2Option(${idx}, this.value)"
                                        class="px-4 py-2 border-2 rounded-lg outline-none cursor-pointer ${selectStyle}"
                                    >
                                        <option value="" disabled ${!userAnswer ? 'selected' : ''}>Chọn đáp án</option>
                                        ${currentQ.options.map(opt => `<option value="${opt.key}" ${userAnswer === opt.key ? 'selected' : ''}>${opt.key}. ${opt.text}</option>`).join('')}
                                    </select>
                                    <div class="flex items-center gap-2">${resultHTML}</div>
                                </div>
                            </div>
                        `;
                    }).join('');

                    contentHTML = `
                        <div class="space-y-5">
                            <div class="flex flex-wrap gap-3">
                                <button onclick="window.playAllListening2()" class="px-4 py-2 bg-blue-600 hover:bg-blue-700 text-white rounded-lg font-semibold">
                                    <i class="fa-solid fa-headphones mr-2"></i>Nghe cả 4 đoạn
                                </button>
                                <button onclick="window.stopSpeaking()" class="px-4 py-2 bg-gray-700 hover:bg-black text-white rounded-lg font-semibold">
                                    <i class="fa-solid fa-stop mr-2"></i>Dừng đọc
                                </button>
                            </div>
                            <div class="space-y-4">${speakerCardsHTML}</div>
                        </div>
                    `;
                }

                quizHTML = `
                    <div class="w-full ${state.activeModule.type === 'reorder' || state.activeModule.type === 'reading3' || state.activeModule.type === 'reading4' || state.activeModule.type === 'listening2' ? 'max-w-7xl' : 'max-w-5xl'} mx-auto flex flex-col h-full">
                        <div class="mb-6 shrink-0">
                            <div class="flex justify-between text-sm font-medium text-gray-500 mb-2">
                                <span>Câu ${state.currentIndex + 1} / ${state.questions.length}</span>
                                <span>Điểm: ${state.score}</span>
                            </div>
                            <div class="w-full bg-gray-200 rounded-full h-2.5">
                                <div class="bg-blue-600 h-2.5 rounded-full transition-all duration-300" style="width: ${((state.currentIndex + 1) / state.questions.length) * 100}%"></div>
                            </div>
                        </div>

                        <div class="bg-white rounded-3xl p-6 md:p-8 shadow-sm border border-gray-100 flex-grow flex flex-col ${state.activeModule.type === 'reading3' || state.activeModule.type === 'reading4' || state.activeModule.type === 'listening2' ? 'overflow-visible' : 'overflow-hidden'}">
                            <h2 class="text-xl md:text-2xl font-bold text-gray-800 mb-6 leading-relaxed border-b pb-4 shrink-0">
                                <span class="text-blue-600 mr-2">
                                    ${state.activeModule.type === 'mcq' ? `Q${currentQ.id}.` : `Đoạn ${currentQ.id}:`}
                                </span> 
                                ${state.activeModule.type === 'mcq' ? currentQ.text : currentQ.title}
                            </h2>
                            ${contentHTML}
                        </div>

                        <div class="mt-6 flex justify-end shrink-0">
                            ${!state.isAnswered ? `
                                <button onclick="window.checkAnswer()" ${isSubmitDisabled ? 'disabled' : ''} class="px-8 py-3 bg-blue-600 disabled:bg-gray-300 disabled:cursor-not-allowed hover:bg-blue-700 text-white font-bold rounded-xl shadow-md transition-all text-lg">
                                    Kiểm tra
                                </button>
                            ` : `
                                <button onclick="window.nextQuestion()" class="px-8 py-3 bg-gray-800 hover:bg-black text-white font-bold rounded-xl shadow-md transition-all flex items-center gap-2 text-lg">
                                    ${state.currentIndex < state.questions.length - 1 ? 'Chuyển bài tiếp theo' : 'Xem kết quả'} <i class="fa-solid fa-chevron-right"></i>
                                </button>
                            `}
                        </div>
                    </div>
                `;
            }

            // Result View
            let resultHTML = '';
            if (state.appState === 'result') {
                const percentage = Math.round((state.score / state.questions.length) * 100);
                let message = "Cần cố gắng hơn!";
                let stars = '';
                if (percentage >= 80) { message = "Xuất sắc!"; stars = '<div class="absolute -top-2 -right-2 text-2xl">✨</div>'; }
                else if (percentage >= 50) message = "Khá tốt!";

                resultHTML = `
                    <div class="flex flex-col items-center justify-center h-full text-center space-y-8 fade-in">
                        <div class="w-32 h-32 bg-yellow-100 rounded-full flex items-center justify-center text-yellow-500 shadow-xl border-4 border-white relative">
                            <i class="fa-solid fa-trophy text-6xl"></i>
                            ${stars}
                        </div>
                        <div>
                            <h2 class="text-3xl font-bold text-gray-800 mb-2">Hoàn thành!</h2>
                            <p class="text-xl text-blue-600 font-semibold">${message}</p>
                        </div>
                        <div class="bg-white p-8 rounded-3xl shadow-sm border border-gray-100 w-full max-w-sm">
                            <div class="text-5xl font-black text-gray-800 mb-2">
                                ${state.score} <span class="text-2xl text-gray-400">/ ${state.questions.length}</span>
                            </div>
                            <p class="text-gray-500 font-medium">Độ chính xác: ${percentage}%</p>
                        </div>
                        <div class="flex gap-4">
                            <button onclick="window.startQuiz()" class="px-6 py-3 bg-blue-600 hover:bg-blue-700 text-white font-bold rounded-xl shadow-md transition-all flex items-center gap-2">
                                <i class="fa-solid fa-rotate-right"></i> Làm lại bài này
                            </button>
                            <button onclick="window.setState({appState: 'menu', isSidebarOpen: true})" class="px-6 py-3 bg-gray-200 hover:bg-gray-300 text-gray-800 font-bold rounded-xl transition-all">
                                Chọn bài khác
                            </button>
                        </div>
                    </div>
                `;
            }

            // Ráp toàn bộ lại
            root.innerHTML = `
                ${sidebarHTML}
                <div class="flex-1 lg:ml-72 flex flex-col h-screen overflow-hidden">
                    <header class="bg-white border-b px-4 py-3 flex items-center justify-between sticky top-0 z-30 shadow-sm shrink-0">
                        <div class="flex items-center gap-3">
                            <button onclick="window.toggleSidebar()" class="p-2 bg-gray-100 hover:bg-gray-200 rounded-lg text-gray-600 transition-colors lg:hidden">
                                <i class="fa-solid fa-bars text-xl"></i>
                            </button>
                            <h1 class="font-bold text-lg text-gray-800 hidden sm:block">Hệ thống Ôn Tập Tiếng Anh</h1>
                        </div>
                        <div class="text-sm font-medium text-blue-600 bg-blue-50 px-4 py-1.5 rounded-full border border-blue-100 flex items-center">
                            ${state.activeModule.type === 'reorder' ? 'Sắp xếp (2 Cột)' : state.activeModule.type === 'reading3' ? 'Reading Part 3 (Matching)' : state.activeModule.type === 'reading4' ? 'Reading Part 4 (Dropdown Matching)' : state.activeModule.type === 'listening2' ? 'Listening Part 2 (Câu 14)' : 'Trắc nghiệm'}
                        </div>
                    </header>
                    <main id="app-main" class="flex-1 overflow-y-auto p-4 md:p-8 flex flex-col relative bg-[#f8fafc]">
                        ${state.appState === 'menu' ? menuHTML : state.appState === 'quiz' ? quizHTML : resultHTML}
                    </main>
                </div>
            `;
        }

        // Khởi chạy ứng dụng lần đầu
        render();
    </script>
</body>
</html>
